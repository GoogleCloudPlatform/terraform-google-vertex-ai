apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-vertex-ai-reasoning-engine
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Vertex AI Agent Engine Nightly Module
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-vertex-ai.git
      sourceType: git
      dir: /modules/agent-engine-nightly
    version: 5.3.2
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
  content:
    examples:
      - name: agent-engine-developer-connect-example
        location: examples/agent-engine-developer-connect-example
      - name: agent-engine-example
        location: examples/agent-engine-example
      - name: agent-engine-nightly-example
        location: examples/agent-engine-nightly-example
      - name: feature-online-store-example
        location: examples/feature-online-store-example
      - name: model-armor-floorsetting-example
        location: examples/model-armor-floorsetting-example
      - name: model-armor-template-example
        location: examples/model-armor-template-example
      - name: workbench-complete-example
        location: examples/workbench-complete-example
      - name: workbench-simple-example
        location: examples/workbench-simple-example
  interfaces:
    variables:
      - name: display_name
        description: The display name of the Reasoning Engine.
        varType: string
        required: true
      - name: project_id
        description: The ID of the project in which the resource belongs.
        varType: string
        required: true
        connections:
          - source:
              source: github.com/terraform-google-modules/terraform-google-project-factory//modules/project_services
              version: ">= 18.2.0"
            spec:
              outputExpr: project_id
      - name: region
        description: The region of the reasoning engine. eg us-central1.
        varType: string
        required: true
      - name: description
        description: The description of the Reasoning Engine.
        varType: string
      - name: kms_key_name
        description: Customer-managed encryption key name for a Reasoning Engine. If set, this Reasoning Engine and all sub-resources will be secured by this key.
        varType: string
        connections:
          - source:
              source: github.com/terraform-google-modules/terraform-google-kms
              version: ">= 4.1.2"
            spec:
              outputExpr: "key_id_list[0]"
      - name: spec
        description: Configurations of the Reasoning Engine.
        varType: |-
          object({
              agent_framework = optional(string)
              class_methods   = optional(list(any))
              deployment_spec = optional(object({
                container_concurrency = optional(number, 9)
                env                   = optional(map(string), {})
                max_instances         = optional(number, 100)
                min_instances         = optional(number, 1)
                psc_interface_config = optional(object({
                  network_attachment = optional(string)
                  dns_peering_configs = optional(list(object({
                    domain         = string
                    target_project = string
                    target_network = string
                  })), [])
                }))
                resource_limits = optional(map(string))
                secret_env = optional(list(object({
                  name = string
                  secret_ref = object({
                    secret  = string
                    version = optional(string)
                  })
                })), [])
              }))
              package_spec = optional(object({
                dependency_files_gcs_uri = optional(string)
                pickle_object_gcs_uri    = optional(string)
                python_version           = optional(string)
                requirements_gcs_uri     = optional(string)
              }))
              source_code_spec = optional(object({
                inline_source = optional(object({
                  source_archive = optional(string)
                }))
                image_spec = optional(object({
                  build_args = optional(map(string))
                }))
                python_spec = optional(object({
                  entrypoint_module = optional(string)
                  entrypoint_object = optional(string)
                  requirements_file = optional(string)
                  version           = optional(string)
                }))
                developer_connect_source = optional(object({
                  config = object({
                    git_repository_link = string
                    dir                 = string
                    revision            = string
                  })
                }))
              }))
              service_account = optional(string)
              identity_type   = optional(string, "SERVICE_ACCOUNT")
            })
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-vertex-ai//modules/model-armor-template
              version: ">= 5.1.1"
            spec:
              outputExpr: "{\"MODEL_ARMOR_TEMPLATE_ID\": template_self_link}"
              inputPath: deployment_spec.env
          - source:
              source: github.com/terraform-google-modules/terraform-google-sql-db//modules/postgresql
              version: ">= 26.2.2"
            spec:
              outputExpr: env_vars
              inputPath: deployment_spec.env
          - source:
              source: github.com/terraform-google-modules/terraform-google-bigquery
              version: ">= 10.2.1"
            spec:
              outputExpr: "{\"BIGQUERY_DATASET_ID\": env_vars.BIGQUERY_DATASET}"
              inputPath: deployment_spec.env
          - source:
              source: github.com/terraform-google-modules/terraform-google-memorystore
              version: ">= 15.2.1"
            spec:
              outputExpr: env_vars
              inputPath: deployment_spec.env
          - source:
              source: github.com/terraform-google-modules/terraform-google-sql-db//modules/mysql
              version: ">= 26.2.2"
            spec:
              outputExpr: env_vars
              inputPath: deployment_spec.env
        - source:
            source: github.com/GoogleCloudPlatform/terraform-google-alloy-db
            version: ">= 8.0.1"
          spec:
            outputExpr: env_vars
            inputPath: deployment_spec.env
        - source:
            source: github.com/GoogleCloudPlatform/terraform-google-bigtable
            version: ">= 0.4.1"
          spec:
            outputExpr: "{\"BIGTABLE_INSTANCE_NAME\": instance_name}"
            inputPath: deployment_spec.env
        - source:
            source: github.com/GoogleCloudPlatform/terraform-google-cloud-tasks
            version: ">= 0.4.0"
          spec:
            outputExpr: "{\"CLOUD_TASKS_QUEUE_ID\": id}"
            inputPath: deployment_spec.env
        - source:
            source: github.com/GoogleCloudPlatform/terraform-google-cloud-composer//modules/google-composer-environment
            version: ">= 0.3.0"
          spec:
            outputExpr: "{\"COMPOSER_DAG_GCS_PREFIX\": dag_gcs_prefix, \"COMPOSER_AIRFLOW_URI\": airflow_uri}"
            inputPath: deployment_spec.env
        - source:
            source: github.com/GoogleCloudPlatform/terraform-google-firestore
            version: ">= 0.2.2"
          spec:
            outputExpr: "{\"FIRESTORE_DATABASE_ID\": database_id}"
            inputPath: deployment_spec.env
        - source:
            source: github.com/terraform-google-modules/terraform-google-cloud-storage//modules/simple_bucket
            version: ">= 12.3.0"
          spec:
            outputExpr: url
            inputPath: package_spec.pickle_object_gcs_uri
        - source:
            source: github.com/terraform-google-modules/terraform-google-cloud-storage//modules/simple_bucket
            version: ">= 12.3.0"
          spec:
            outputExpr: url
            inputPath: package_spec.requirements_gcs_uri
        - source:
            source: github.com/GoogleCloudPlatform/terraform-google-vertex-ai//modules/model-armor-floorsetting
            version: ">= 4.0.0"
          spec:
            outputExpr: "{\"MODEL_ARMOR_FLOOR_ID\": floorsetting.id}"
            inputPath: deployment_spec.env
        - source:
            source: github.com/terraform-google-modules/terraform-google-network//modules/private-service-connect-endpoints-for-published-services
            version: ">= 18.0.0"
          spec:
            outputExpr: "{\"PSC_ENDPOINT_IP\": ip_address}"
            inputPath: deployment_spec.env
        - source:
            source: github.com/terraform-google-modules/terraform-google-pubsub
            version: ">= 8.6.0"
          spec:
            outputExpr: env_vars
            inputPath: deployment_spec.env
        - source:
            source: github.com/GoogleCloudPlatform/terraform-google-secret-manager//modules/simple-secret
            version: ">= 0.9.0"
          spec:
            outputExpr: "[{\"name\": \"REASONING_ENGINE_SECRET\", \"secret_ref\": {\"secret\": name, \"version\": version}}]"
            inputPath: deployment_spec.secret_env
        - source:
            source: github.com/GoogleCloudPlatform/terraform-google-cloud-spanner
            version: ">= 1.2.1"
          spec:
            outputExpr: env_vars
            inputPath: deployment_spec.env
        - source:
            source: github.com/GoogleCloudPlatform/terraform-google-vertex-ai//modules/agent-engine-nightly
            version: ">= 5.3.2"
          spec:
            outputExpr: "{\"PARENT_ENGINE_ID\": reasoning_engine_id}"
            inputPath: deployment_spec.env
        - source:
            source: github.com/terraform-google-modules/terraform-google-service-accounts//modules/simple-sa
            version: ">= 4.7.0"
          spec:
            outputExpr: email
            inputPath: service_account
      - name: google_managed_agent_gateway_config
        description: A list of configurations for the Agent Gateway. This list can contain up to two objects, one for 'CLIENT_TO_AGENT' and one for 'AGENT_TO_ANYWHERE', each with their respective gateway_id.
        varType: |-
          list(object({
              gateway_type = string
              gateway_id   = string
            }))
        defaultValue: []
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-agent-gateway
              version: ">= 0.4.1"
            spec:
              outputExpr: "[{\"gateway_type\": google_managed_gateway_type, \"gateway_id\": agent_gateway_id}]"
      - name: service_account_roles
        description: A list of roles to assign to the Vertex AI Service Identity.
        varType: list(string)
        defaultValue: []
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-agent-gateway
              version: ">= 0.4.1"
            spec:
              outputExpr: "[\"roles/networkservices.admin\"]"
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-vertex-ai//modules/model-armor-template
              version: ">= 5.1.6"
            spec:
              outputExpr: "[\"roles/networkservices.admin\", \"roles/modelarmor.user\",  \"roles/modelarmor.calloutUser\"]"
      - name: effective_identity_roles
        description: A list of roles to assign to the Reasoning Engine's effective identity.
        varType: list(string)
        defaultValue: []
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-vertex-ai//modules/model-armor-template
              version: ">= 5.1.6"
            spec:
              outputExpr: "[\"roles/networkservices.admin\", \"roles/modelarmor.user\", \"roles/modelarmor.calloutUser\"]"
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-agent-gateway
              version: ">= 0.4.1"
            spec:
              outputExpr: "[\"roles/modelarmor.user\", \"roles/modelarmor.calloutUser\"]"
      - name: module_depends_on
        description: A list of resources or modules that this authorization policy depends on.
        varType: list(string)
        defaultValue: []
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-network-security-authz//modules/authz-policy
              version: ">=0.4.1"
            spec:
              outputExpr: "[id]"
          - source:
              source: github.com/terraform-google-modules/terraform-google-project-factory//modules/project_services
              version: ">= 18.2.0"
            spec:
              outputExpr: "[project_id]"
    outputs:
      - name: discovery_filter
        description: The pre-formatted filter string to discover this agent in the registry.
      - name: effective_identity
        description: The service identity used for the Reasoning Engine deployment.
      - name: reasoning_engine
        description: The full google_vertex_ai_reasoning_engine resource object.
      - name: reasoning_engine_console_url
        description: The URL to the Vertex AI Agent Engine console page.
      - name: reasoning_engine_id
        description: The unique identifier for the Reasoning Engine resource.
      - name: reasoning_engine_name
        description: The generated name of the Reasoning Engine.
      - name: reasoning_engine_url
        description: The full regional API URL for the Reasoning Engine interaction.
  requirements:
    roles:
      - level: Project
        roles:
          - roles/aiplatform.admin
          - roles/compute.admin
          - roles/compute.networkAdmin
          - roles/notebooks.admin
          - roles/iam.securityAdmin
          - roles/iam.serviceAccountAdmin
          - roles/iam.serviceAccountUser
          - roles/cloudkms.admin
          - roles/iam.roleAdmin
          - roles/storage.admin
          - roles/cloudkms.cryptoKeyEncrypterDecrypter
          - roles/modelarmor.admin
          - roles/modelarmor.floorSettingsAdmin
    services:
      - cloudresourcemanager.googleapis.com
      - serviceusage.googleapis.com
      - iamcredentials.googleapis.com
      - iam.googleapis.com
      - cloudbilling.googleapis.com
      - cloudkms.googleapis.com
      - servicenetworking.googleapis.com
      - secretmanager.googleapis.com
      - notebooks.googleapis.com
      - aiplatform.googleapis.com
      - iap.googleapis.com
      - modelarmor.googleapis.com
      - dlp.googleapis.com
    providerVersions:
      - source: hashicorp/google
        version: ">= 7.19, < 8"
      - source: hashicorp/google-beta
        version: ">= 7.19, < 8"
      - source: hashicorp/google-nightly
        version: 5.3.2.27.0
