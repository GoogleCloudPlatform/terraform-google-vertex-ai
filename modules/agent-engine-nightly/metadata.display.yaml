apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-vertex-ai-reasoning-engine-display
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Vertex AI Agent Engine Nightly Module
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-vertex-ai.git
      sourceType: git
      dir: /modules/agent-engine-nightly
  ui:
    input:
      variables:
        description:
          name: description
          title: Description
        display_name:
          name: display_name
          title: Display Name
        effective_identity_roles:
          name: effective_identity_roles
          title: Effective Identity Roles
        encryption_spec:
          name: encryption_spec
          title: Encryption Spec
        google_managed_agent_gateway_config:
          name: google_managed_agent_gateway_config
          title: Google Managed Agent Gateway Config
        kms_key_name:
          name: kms_key_name
          title: Kms Key Name
        project_id:
          name: project_id
          title: Project Id
        region:
          name: region
          title: Region
        service_account_roles:
          name: service_account_roles
          title: Service Account Roles
        spec:
          name: spec
          title: Spec
          properties:
            identity_type:
              name: identity_type
              title: Identity Type
              enumValueLabels:
                - label: SERVICE_ACCOUNT
                  value: SERVICE_ACCOUNT
                - label: AGENT_IDENTITY
                  value: AGENT_IDENTITY
            source_code_spec:
              name: source_code_spec
              title: Source Code Spec
              properties:
                inline_source:
                  name: inline_source
                  title: Inline Source
                  properties:
                    local_archive:
                      name: local_archive
                      title: Local Archive
                      enumValueLabels:
                        - label: Single Agent Model Armor
                          value: preconfigured-agents/single-agent-model-armor.tar.gz
                        - label: Simple Agent
                          value: preconfigured-agents/simple-agent.tar.gz
    runtime:
      outputs:
        discovery_filter:
          visibility: VISIBILITY_ROOT
        effective_identity:
          visibility: VISIBILITY_ROOT
        reasoning_engine_console_url:
          visibility: VISIBILITY_ROOT
        reasoning_engine_id:
          visibility: VISIBILITY_ROOT
        reasoning_engine_url:
          visibility: VISIBILITY_ROOT
